name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init env
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo 'DPkg::Post-Invoke { "rm -f /var/lib/dpkg/triggers/* 2>/dev/null || true"; };' \
            | sudo tee /etc/apt/apt.conf.d/99no-triggers > /dev/null
          echo 'DPkg::TriggersPending "false";' \
            | sudo tee -a /etc/apt/apt.conf.d/99no-triggers > /dev/null

          sudo -E apt-get -qq update

          sudo -E apt-get install -y --no-install-recommends \
            build-essential \
            protobuf-compiler \
            libacl1-dev \
            libssl-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt (check)
        run: cargo fmt --all -- --check

      - name: cargo clippy (-D warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

  test-common:
    name: test-aura-common
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init env
